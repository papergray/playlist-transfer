name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ─────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── 3. Set up Java 17 ─────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      # ── 4. Set up Android SDK ─────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install npm dependencies ───────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 6. Build the web app with Vite ────────────────────────────
      - name: Build web app
        run: npm run build

      # ── 7. Add Android platform (only if android/ doesn't exist) ──
      - name: Add Capacitor Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platform already exists, skipping add."
          fi

      # ── 8. Sync web build into Android project ────────────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 9. Make Gradle wrapper executable ────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 10. Cache Gradle files ────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 11. Build debug APK ───────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── 12. Upload APK as artifact ────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: playlist-transfer-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 13. Comment APK download link on PRs ─────────────────────
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **APK built successfully!**\n\nDownload it from the [Actions tab](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) → Artifacts → \`playlist-transfer-debug-${{ github.run_number }}\``
            })
